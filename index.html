<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HSJ Experience</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
      font-family: sans-serif;
      background: black;
    }

    /* CAMERA */
    #camera {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* VIDEO OVERLAY (RESPONSIVE) */
    #overlayVideo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 95vw;
      max-width: 720px;
      height: auto;
      z-index: 2;
      border-radius: 14px;
    }

    /* LANDSCAPE MODE */
    @media (orientation: landscape) {
      #overlayVideo {
        width: auto;
        height: 80vh;
        max-width: none;
      }
    }

    /* TAP SCREEN (20% bigger) */
    #tapLayer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      z-index: 999;
      text-align: center;
      padding: 20px;
    }

    /* INSTRUCTION BOX (20% bigger) */
    #instructionBox {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 20px;
      z-index: 3;
      text-align: center;
    }
  </style>
</head>

<body>

<div id="tapLayer">
  Tap once to start video with sound
</div>

<video id="camera" autoplay playsinline></video>

<video
  id="overlayVideo"
  src="video.mp4"
  loop
  playsinline
></video>

<div id="instructionBox">
  कैमरा चालू है • वीडियो अपने आप चलेगा
</div>

<script>
  const tapLayer = document.getElementById("tapLayer");
  const camera = document.getElementById("camera");
  const overlayVideo = document.getElementById("overlayVideo");

  tapLayer.addEventListener("click", async () => {
    tapLayer.style.display = "none";

    // START CAMERA
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
        audio: false
      });
      camera.srcObject = stream;
    } catch (err) {
      alert("Please allow camera access");
    }

    // 🔥 AUDIO FIX
    try {
      overlayVideo.muted = true;
      await overlayVideo.play();

      overlayVideo.muted = false;
      await overlayVideo.play();
    } catch (e) {
      console.log("Playback issue", e);
    }
  });

  // 🔥 HANDLE ROTATION SMOOTHLY
  window.addEventListener("orientationchange", () => {
    overlayVideo.style.display = "none";
    setTimeout(() => {
      overlayVideo.style.display = "block";
    }, 300);
  });
</script>

</body>
</html>
