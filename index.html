<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HSJ Experience</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
      font-family: sans-serif;
      background: black;
    }

    /* CAMERA */
    #camera {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* VIDEO OVERLAY (10% bigger) */
    #overlayVideo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 99vw; /* increased from 90 */
      max-width: 660px; /* increased */
      z-index: 2;
      border-radius: 12px;
    }

    /* TAP SCREEN */
    #tapLayer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px; /* bigger */
      z-index: 999;
      text-align: center;
      padding: 20px;
    }

    /* INSTRUCTION BOX (10% bigger) */
    #instructionBox {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 14px 22px; /* bigger */
      border-radius: 10px;
      font-size: 18px; /* bigger */
      z-index: 3;
      text-align: center;
    }
  </style>
</head>

<body>

<!-- CLEAR AUDIO INSTRUCTION -->
<div id="tapLayer">
  Tap once to start video with sound
</div>

<video id="camera" autoplay playsinline></video>

<video
  id="overlayVideo"
  src="video.mp4"
  loop
  playsinline
></video>

<div id="instructionBox">
  कैमरा चालू है • वीडियो अपने आप चलेगा
</div>

<script>
  const tapLayer = document.getElementById("tapLayer");
  const camera = document.getElementById("camera");
  const overlayVideo = document.getElementById("overlayVideo");

  tapLayer.addEventListener("click", async () => {
    tapLayer.style.display = "none";

    // 🔥 START CAMERA
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
        audio: false
      });
      camera.srcObject = stream;
    } catch (err) {
      alert("Please allow camera access");
    }

    // 🔥 FORCE AUDIO UNLOCK
    overlayVideo.muted = false;

    try {
      await overlayVideo.play();
    } catch (e) {
      // fallback if blocked
      overlayVideo.muted = true;
      await overlayVideo.play();
    }
  });
</script>

</body>
</html>
