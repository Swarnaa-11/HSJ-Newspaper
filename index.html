<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HSJ Experience</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
      font-family: sans-serif;
      background: transparent;
    }

    /* CAMERA FEED */
    #camera {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* VIDEO OVERLAY */
    #overlayVideo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90vw;
      max-width: 600px;
      z-index: 2;
      border-radius: 12px;
    }

    /* TAP SCREEN */
    #tapLayer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      z-index: 999;
    }

    /* INSTRUCTION BOX */
    #instructionBox {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 16px;
      z-index: 3;
      text-align: center;
    }
  </style>
</head>

<body>

<div id="tapLayer">Tap to start experience</div>

<video id="camera" autoplay playsinline></video>

<video
  id="overlayVideo"
  src="https://res.cloudinary.com/dxdq6kiso/video/upload/v1776431150/HSJ_Newspaper_video_AR_rysgta.mp4"
  loop
  playsinline
></video>

<div id="instructionBox">
  कैमरा चालू है • वीडियो अपने आप चलेगा
</div>

<script>
  const tapLayer = document.getElementById("tapLayer");
  const camera = document.getElementById("camera");
  const overlayVideo = document.getElementById("overlayVideo");

  tapLayer.addEventListener("click", async () => {
    tapLayer.style.display = "none";

    // 🔥 START CAMERA
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
        audio: false
      });
      camera.srcObject = stream;
    } catch (err) {
      alert("Camera permission denied");
    }

    // 🔥 PLAY VIDEO WITH SOUND
    overlayVideo.muted = false;
    overlayVideo.play().catch(() => {
      overlayVideo.muted = true;
      overlayVideo.play();
    });
  });
</script>

</body>
</html>
