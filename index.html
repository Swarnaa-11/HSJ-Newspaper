<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HSJ AR Experience</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
      background: transparent;
    }

    a-scene {
      position: fixed !important;
      width: 100% !important;
      height: 100% !important;
      background: transparent !important;
    }

    #startButton {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 14px 22px;
      background: white;
      color: black;
      font-size: 16px;
      border-radius: 8px;
      z-index: 999;
      border: none;
    }

    .instructions {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 14px;
      z-index: 10;
    }
  </style>
</head>

<body>

<button id="startButton">Start AR Experience</button>

<div class="instructions">
  Tap start → Point camera at the newspaper
</div>

<a-scene
  mindar-image="imageTargetSrc: target.mind;"
  embedded
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  renderer="antialias: false; alpha: true; precision: mediump;"
>

  <a-assets>
    <video
      id="vid"
      src="video.mp4"
      loop
      muted
      playsinline
      webkit-playsinline
      preload="auto"
      crossorigin="anonymous"
    ></video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity 
    mindar-image-target="targetIndex: 0"
    mindar-image-target-smoothing="enabled: true; filterMinCF: 0.0001; filterBeta: 0.01"
  >

    <!-- ✅ 5% increased size -->
    <a-video
      src="#vid"
      width="0.84"
      height="0.475"
      position="0 0 0"
      material="shader: flat;"
    ></a-video>

  </a-entity>

</a-scene>

<script>
  const startButton = document.querySelector("#startButton");
  const scene = document.querySelector("a-scene");
  const video = document.querySelector("#vid");

  startButton.addEventListener("click", async () => {
    const mindarSystem = scene.systems["mindar-image-system"];
    await mindarSystem.start();
    video.play().catch(() => {});
    startButton.style.display = "none";
  });

  scene.addEventListener("targetFound", () => video.play());
  scene.addEventListener("targetLost", () => video.pause());
</script>

</body>
</html>
