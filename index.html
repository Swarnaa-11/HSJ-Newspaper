<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HSJ Experience</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
      font-family: sans-serif;
      background: black;
    }

    #tapLayer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      z-index: 999;
    }

    #instructionBox {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 16px;
      z-index: 10;
      text-align: center;
    }
  </style>
</head>

<body>

<!-- TAP TO START -->
<div id="tapLayer">Tap to start experience</div>

<!-- CLEAR INSTRUCTION BOX -->
<div id="instructionBox">
  कैमरा चालू है • वीडियो अपने आप चलेगा
</div>

<!-- CAMERA SCENE -->
<a-scene
  embedded
  vr-mode-ui="enabled: false"
  renderer="antialias: false; alpha: true;"
>

  <!-- CAMERA -->
  <a-entity camera look-controls="enabled: false"></a-entity>

  <!-- VIDEO ASSET -->
  <a-assets>
    <video
      id="vid"
      src="https://res.cloudinary.com/dxdq6kiso/video/upload/v1776431150/HSJ_Newspaper_video_AR_rysgta.mp4"
      loop
      playsinline
      webkit-playsinline
      crossorigin="anonymous"
    ></video>
  </a-assets>

  <!-- FIXED CENTER VIDEO -->
  <a-video
    src="#vid"
    position="0 0 -2"
    width="1.6"
    height="0.9"
  ></a-video>

</a-scene>

<script>
  const tapLayer = document.querySelector("#tapLayer");
  const video = document.querySelector("#vid");

  tapLayer.addEventListener("click", async () => {
    tapLayer.style.display = "none";

    // Enable sound after tap
    video.muted = false;

    video.play().catch(() => {
      video.muted = true;
      video.play();
    });
  });
</script>

</body>
</html>
