<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AR Jewellery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; overflow:hidden;">

  <!-- Your video -->
  <video id="video" 
    src="your-video.mp4" 
    loop 
    muted 
    playsinline 
    crossorigin="anonymous"
    style="display:none;">
  </video>

  <!-- 🔴 THESE go HERE (before closing body) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>

  <!-- Your AR code -->
  <script>
    document.addEventListener("DOMContentLoaded", async () => {

      const mindarThree = new window.MINDAR.IMAGE.MindARThree({
        container: document.body,
        imageTargetSrc: "./targets.mind",
      });

      const {renderer, scene, camera} = mindarThree;

      const anchor = mindarThree.addAnchor(0);

      const video = document.querySelector("#video");
      const texture = new THREE.VideoTexture(video);

      const geometry = new THREE.PlaneGeometry(1, 1.5); // adjust later
      const material = new THREE.MeshBasicMaterial({ map: texture });

      const plane = new THREE.Mesh(geometry, material);
      plane.position.set(0, 0, 0.01);
      anchor.group.add(plane);

      anchor.onTargetFound = () => {
        video.play();
      };

      anchor.onTargetLost = () => {
        video.pause();
      };

      await mindarThree.start();

      renderer.setAnimationLoop(() => {
        renderer.render(scene, camera);
      });

    });
  </script>

</body>
</html>
