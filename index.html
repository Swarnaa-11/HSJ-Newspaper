<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HSJ AR Experience</title>

  <!-- MindAR + A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
      background: black;
    }

    .instructions {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 14px;
      z-index: 10;
    }
  </style>
</head>

<body>

  <!-- Instruction text -->
  <div class="instructions">
    Point your camera at the newspaper
  </div>

  <!-- AR Scene -->
  <a-scene
    mindar-image="imageTargetSrc: target.mind; autoStart: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true"
    embedded
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
  >

    <!-- Assets -->
    <a-assets>
      <video
        id="vid"
        src="https://res.cloudinary.com/dxdq6kiso/video/upload/v1776431150/HSJ_Newspaper_video_AR_rysgta.mp4"
        loop
        muted
        autoplay
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      ></video>
    </a-assets>

    <!-- Camera -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Image Target -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- Video overlay -->
      <a-video
        src="#vid"
        width="1.5"
        height="0.9"
        position="0 0.2 0"
      ></a-video>

    </a-entity>

  </a-scene>

  <script>
    const video = document.querySelector("#vid");
    const scene = document.querySelector("a-scene");

    scene.addEventListener("targetFound", () => {
      video.play();
    });

    scene.addEventListener("targetLost", () => {
      video.pause();
    });

    // iOS fix: ensure video starts after interaction
    document.body.addEventListener("click", () => {
      video.play();
    });
  </script>

</body>
</html>
