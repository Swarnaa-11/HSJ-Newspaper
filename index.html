<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HSJ Experience</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
      font-family: sans-serif;
      background: black;
    }

    /* CAMERA */
    #camera {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* VIDEO OVERLAY (DEFAULT = PORTRAIT / AUTO MODE) */
    #overlayVideo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      width: 95vw;
      height: auto;

      aspect-ratio: 16 / 9;

      max-height: 85vh;

      object-fit: contain;
      z-index: 2;
      border-radius: 14px;
    }

    /* LANDSCAPE MODE FIX */
    @media (orientation: landscape) {
      #overlayVideo {
        width: auto;
        height: 90vh;
        max-height: 90vh;
        aspect-ratio: auto;
      }
    }

    /* TAP SCREEN */
    #tapLayer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      z-index: 999;
      text-align: center;
      padding: 20px;
    }

    /* INSTRUCTION BOX */
    #instructionBox {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 20px;
      z-index: 3;
      text-align: center;
    }
  </style>
</head>

<body>

<!-- TAP SCREEN -->
<div id="tapLayer">
Tap once, rotate phone, and increase volume for full experience
</div>

<!-- CAMERA -->
<video id="camera" autoplay playsinline></video>

<!-- MAIN VIDEO -->
<video
  id="overlayVideo"
  src="video.mp4"
  loop
  playsinline
></video>

<!-- INSTRUCTION -->
<div id="instructionBox">
  Loading Video...
</div>

<script>
  const tapLayer = document.getElementById("tapLayer");
  const camera = document.getElementById("camera");
  const overlayVideo = document.getElementById("overlayVideo");

  tapLayer.addEventListener("click", async () => {
    tapLayer.style.display = "none";

    // FULLSCREEN
    const elem = document.documentElement;
    if (elem.requestFullscreen) {
      try {
        await elem.requestFullscreen();
      } catch (e) {
        console.log("Fullscreen not allowed");
      }
    }

    // ORIENTATION LOCK
    if (screen.orientation && screen.orientation.lock) {
      try {
        await screen.orientation.lock("landscape");
      } catch (e) {
        console.log("Orientation lock not supported");
      }
    }

    // CAMERA
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
        audio: false
      });
      camera.srcObject = stream;
    } catch (err) {
      alert("Please allow camera access");
    }

    // VIDEO PLAY FIX
    try {
      overlayVideo.muted = true;
      await overlayVideo.play();

      overlayVideo.muted = false;
      await overlayVideo.play();
    } catch (e) {
      console.log("Playback issue", e);
    }
  });
</script>

</body>
</html>
