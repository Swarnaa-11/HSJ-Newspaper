<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HSJ AR Experience</title>

  <!-- Libraries -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
      background: black;
    }

    a-scene {
      position: fixed !important;
      width: 100% !important;
      height: 100% !important;
      background: transparent !important;
    }

    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 16px;
      z-index: 999;
    }
  </style>
</head>

<body>

<div id="loading">Loading AR Experience...</div>

<a-scene
  mindar-image="imageTargetSrc: target.mind;"
  embedded
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  renderer="antialias: false; alpha: true; precision: mediump;"
>

  <a-assets timeout="10000">

    <!-- 🔥 OPTIMIZED VIDEO -->
    <video
      id="vid"
      src="video.mp4"
      loop
      muted
      playsinline
      webkit-playsinline
      preload="auto"
      crossorigin="anonymous"
    ></video>

  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity 
    mindar-image-target="targetIndex: 0"
    mindar-image-target-smoothing="enabled: true; filterMinCF: 0.0001; filterBeta: 0.01"
  >

    <a-video
      src="#vid"
      width="0.84"
      height="0.475"
      position="0 0 0"
      material="shader: flat;"
    ></a-video>

  </a-entity>

</a-scene>

<script>
  const video = document.querySelector("#vid");
  const loading = document.querySelector("#loading");
  const scene = document.querySelector("a-scene");

  // 🔥 START AR IMMEDIATELY (no button delay)
  scene.addEventListener("loaded", async () => {
    const mindarSystem = scene.systems["mindar-image-system"];
    await mindarSystem.start();

    loading.style.display = "none";
  });

  // 🔥 PLAY ONLY WHEN TARGET FOUND (saves performance)
  scene.addEventListener("targetFound", () => {
    video.play();
  });

  scene.addEventListener("targetLost", () => {
    video.pause();
  });
</script>

</body>
</html>
