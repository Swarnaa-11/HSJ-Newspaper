<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HSJ AR Experience</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
      background: black;
      font-family: sans-serif;
    }

    a-scene {
      position: fixed !important;
      width: 100% !important;
      height: 100% !important;
    }

    .instructions {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 14px;
      z-index: 10;
    }
  </style>
</head>

<body>

<div class="instructions">
  कैमरा खुलते ही पेपर की तरफ करें
</div>

<a-scene
  mindar-image="imageTargetSrc: target.mind;"
  embedded
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  renderer="antialias: false; alpha: true; precision: mediump;"
>

  <a-assets>
    <video
      id="vid"
      src="https://res.cloudinary.com/dxdq6kiso/video/upload/v1776431150/HSJ_Newspaper_video_AR_rysgta.mp4"
      loop
      muted
      playsinline
      webkit-playsinline
      crossorigin="anonymous"
    ></video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <a-video
      src="#vid"
      width="1.5"
      height="0.9"
      position="0 0.2 0"
      material="shader: flat;"
    ></a-video>

  </a-entity>

</a-scene>

<script>
  const scene = document.querySelector("a-scene");
  const video = document.querySelector("#vid");

  let hasPlayed = false;

  // 🔥 AUTO START AR
  scene.addEventListener("loaded", async () => {
    const mindarSystem = scene.systems["mindar-image-system"];
    await mindarSystem.start();

    // Try autoplay (muted)
    video.play().catch(() => {});
  });

  // 🔥 PLAY WHEN TARGET FOUND
  scene.addEventListener("targetFound", () => {
    video.muted = false; // try enabling sound
    video.play();
    hasPlayed = true;
  });

  // 🔥 PAUSE WHEN LOST
  scene.addEventListener("targetLost", () => {
    video.pause();
  });

  // 🔥 FALLBACK: play after 5 sec even if not scanned
  setTimeout(() => {
    if (!hasPlayed) {
      video.muted = false;
      video.play().catch(() => {
        video.muted = true;
        video.play();
      });
    }
  }, 5000);
</script>

</body>
</html>
